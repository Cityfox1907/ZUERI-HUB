<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ZüriHub – Events & Veranstaltungen</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎪</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design-tokens.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F4F7FB;--surface:#FFFFFF;--surface2:#EBF0F7;--border:#D4DCE8;--border-light:#E8EDF5;--text:#0D1B2A;--text2:#4A5568;--text3:#8896A6;--primary:#0F47AF;--primary-light:#E8EEFB;--primary-lighter:#F2F5FC;--primary-dark:#0A3580;--primary-50:rgba(15,71,175,.06);--accent:#E63946;--accent-light:#FEF0F1;--gold:#D4930D;--radius:14px;--shadow:0 1px 3px rgba(13,27,42,.05),0 1px 2px rgba(13,27,42,.03);--shadow-md:0 4px 14px rgba(13,27,42,.08);--shadow-lg:0 12px 36px rgba(13,27,42,.12);--font:'Inter',system-ui,-apple-system,sans-serif;--font-display:'Fraunces',Georgia,serif;--card-bg:#FFFFFF;--header-bg:rgba(255,255,255,.92);--modal-bg:#fff;--splash-bg:var(--primary)}
html.dark{--bg:#0f1b2d;--surface:#1a2a3a;--surface2:#1e3148;--border:#2a3f58;--border-light:#243650;--text:#e8ecf2;--text2:#a8b8cc;--text3:#6b7f96;--primary:#5a9cf5;--primary-light:#1e3148;--primary-lighter:#162538;--primary-dark:#7bb8ff;--primary-50:rgba(90,156,245,.08);--accent:#ff6b78;--accent-light:#2a1820;--gold:#f5a623;--shadow:0 1px 3px rgba(0,0,0,.2),0 1px 2px rgba(0,0,0,.15);--shadow-md:0 4px 14px rgba(0,0,0,.3);--shadow-lg:0 12px 36px rgba(0,0,0,.4);--card-bg:#1a2a3a;--header-bg:rgba(15,27,45,.92);--modal-bg:#1a2a3a;--splash-bg:#0f1b2d}
html{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .3s,color .3s}body{min-height:100vh;overflow-x:hidden}input,select,button,textarea{font-family:inherit;font-size:inherit}button{cursor:pointer;border:none;background:none}a{color:inherit;text-decoration:none}::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}@keyframes spin{to{transform:rotate(360deg)}}.fade-up{animation:fadeUp .35s ease both}

/* Splash */
#splash{position:fixed;inset:0;background:var(--splash-bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;transition:opacity .5s,visibility .5s}#splash.done{opacity:0;visibility:hidden;pointer-events:none}#splash::before{content:'';position:absolute;top:0;right:0;width:50%;height:100%;background:rgba(255,255,255,.06);clip-path:polygon(30% 0,100% 0,100% 100%,0 100%)}.splash-logo{font-family:var(--font-display);font-size:clamp(2rem,5vw,3rem);font-weight:800;position:relative;z-index:1}.splash-sub{font-size:.95rem;opacity:.7;margin-top:.5rem;position:relative;z-index:1}.splash-spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;margin-top:2rem;position:relative;z-index:1}

/* Header */
.header{position:sticky;top:0;z-index:100;background:var(--header-bg);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border-bottom:1px solid var(--border-light);padding:.5rem 1.5rem;transition:background .3s}.header-inner{max-width:1480px;margin:0 auto;display:flex;align-items:center;gap:.75rem}.logo{font-family:var(--font-display);font-size:1.25rem;font-weight:800;color:var(--primary);white-space:nowrap;flex-shrink:0;letter-spacing:-.02em;display:inline-flex;align-items:center;gap:.4rem;text-decoration:none}.logo-icon{flex-shrink:0;display:block}
.hactions{display:flex;gap:.35rem;align-items:center;margin-left:auto}.hbtn{padding:.42rem .75rem;border-radius:8px;font-size:.8rem;font-weight:500;color:var(--text2);border:1.5px solid var(--border);background:var(--surface);transition:all .15s;display:inline-flex;align-items:center;gap:.3rem;white-space:nowrap;text-decoration:none}.hbtn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-lighter)}html.dark .hbtn{background:var(--surface);border-color:var(--border);color:var(--text2)}
.theme-toggle{position:relative;width:52px;height:28px;border-radius:14px;background:var(--border);cursor:pointer;border:1.5px solid var(--border);transition:all .3s;flex-shrink:0;display:flex;align-items:center}.theme-toggle .toggle-knob{position:absolute;left:2px;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.15);transition:transform .3s cubic-bezier(.4,0,.2,1)}.theme-toggle .toggle-icon-sun,.theme-toggle .toggle-icon-moon{position:absolute;font-size:.75rem;transition:opacity .25s}.theme-toggle .toggle-icon-sun{right:6px;opacity:1}.theme-toggle .toggle-icon-moon{left:6px;opacity:0}html.dark .theme-toggle{background:#1e3148;border-color:#2a3f58}html.dark .theme-toggle .toggle-knob{transform:translateX(24px);background:#e8914a}html.dark .theme-toggle .toggle-icon-sun{opacity:0}html.dark .theme-toggle .toggle-icon-moon{opacity:1}

/* Nav */
.nav-tabs{max-width:1480px;margin:0 auto;display:flex;align-items:center;justify-content:center;gap:0;border-bottom:1px solid var(--border-light);padding:0 1.25rem}.nav-tab{padding:.6rem .85rem;font-size:.82rem;font-weight:600;color:var(--text3);text-decoration:none;border-bottom:2.5px solid transparent;transition:color .25s,border-color .25s;white-space:nowrap;display:inline-flex;align-items:center;gap:.35rem}.nav-tab:hover{color:var(--text)}.nav-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:700}.nav-tab .nav-emoji{font-size:1rem}html.dark .nav-tab{color:var(--text2)}html.dark .nav-tab.active{color:var(--primary);border-bottom-color:var(--primary)}

/* Pulse Hero Banner */
.pulse-hero{background:linear-gradient(135deg,var(--primary) 0%,#1a6fd4 50%,#2b8aed 100%);color:#fff;border-radius:20px;padding:1.75rem;margin:1.25rem 1.5rem;max-width:1480px;margin-left:auto;margin-right:auto;position:relative;overflow:hidden;box-shadow:var(--shadow-lg)}
.pulse-hero::before{content:'';position:absolute;top:-30%;right:-10%;width:50%;height:160%;background:rgba(255,255,255,.06);border-radius:50%;pointer-events:none}
.pulse-hero::after{content:'';position:absolute;bottom:-20%;left:-5%;width:30%;height:120%;background:rgba(255,255,255,.04);border-radius:50%;pointer-events:none}
html.dark .pulse-hero{background:linear-gradient(135deg,#1e3148 0%,#243e5c 50%,#2a4f73 100%)}
.pulse-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;opacity:.7;margin-bottom:.5rem;display:flex;align-items:center;gap:.35rem}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulseDot 2s ease infinite}
@keyframes pulseDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
.pulse-content{display:flex;align-items:center;gap:1.5rem;position:relative;z-index:1}
.pulse-emoji{font-size:3rem;flex-shrink:0}
.pulse-info{flex:1;min-width:0}
.pulse-name{font-family:var(--font-display);font-size:clamp(1.2rem,3vw,1.6rem);font-weight:800;line-height:1.2;margin-bottom:.25rem}
.pulse-meta{font-size:.82rem;opacity:.85;display:flex;flex-wrap:wrap;gap:.5rem;align-items:center}
.pulse-meta span{display:inline-flex;align-items:center;gap:.2rem}
.pulse-countdown{display:flex;gap:.5rem;flex-shrink:0}
.cd-box{background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border-radius:12px;padding:.5rem .65rem;text-align:center;min-width:52px}
.cd-num{font-family:var(--font-display);font-size:1.4rem;font-weight:800;line-height:1.2}
.cd-label{font-size:.55rem;text-transform:uppercase;opacity:.65;letter-spacing:.04em}
.pulse-cta{margin-top:.85rem;display:flex;gap:.5rem;flex-wrap:wrap}
.pulse-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.45rem .9rem;border-radius:12px;font-size:.8rem;font-weight:600;transition:all .18s;text-decoration:none;color:#fff;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25)}
.pulse-btn:hover{background:rgba(255,255,255,.3)}

/* Category Cards */
.cat-cards{display:grid;grid-template-columns:repeat(6,1fr);gap:.6rem;max-width:1480px;margin:0 auto 1rem;padding:0 1.5rem}
.cat-card{background:var(--glass-bg,var(--card-bg));backdrop-filter:var(--glass-blur,none);border:2px solid var(--glass-border,var(--border-light));border-radius:14px;padding:.85rem .65rem;text-align:center;cursor:pointer;transition:all .22s var(--ease);box-shadow:var(--shadow-soft,var(--shadow));position:relative}
.cat-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover,var(--shadow-md))}
.cat-card.active{border-color:var(--primary);background:var(--primary-lighter)}
html.dark .cat-card{background:var(--glass-bg,var(--card-bg));border-color:var(--glass-border,var(--border))}
html.dark .cat-card.active{border-color:var(--primary);background:var(--primary-light)}
.cat-card-emoji{font-size:1.6rem;display:block;margin-bottom:.2rem}
.cat-card-title{font-weight:700;font-size:.75rem;color:var(--text)}
.cat-card-count{display:inline-block;margin-top:.3rem;padding:.1rem .4rem;border-radius:8px;background:var(--primary-light);color:var(--primary);font-size:.62rem;font-weight:700}
html.dark .cat-card-count{background:rgba(90,156,245,.15)}

/* Month Nav */
.month-nav{position:sticky;top:53px;z-index:50;background:var(--header-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border-light);padding:.45rem 1.5rem;max-width:100%;overflow-x:auto;scrollbar-width:none;display:flex;justify-content:center;gap:.35rem;transition:background .3s}
.month-nav::-webkit-scrollbar{display:none}
.month-pill{padding:.35rem .7rem;border-radius:10px;font-size:.75rem;font-weight:600;color:var(--text3);background:transparent;border:1.5px solid transparent;cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0}
.month-pill:hover{color:var(--text);background:var(--surface2)}
.month-pill.active{color:var(--primary);background:var(--primary-lighter);border-color:var(--primary);font-weight:700}
.month-pill.past{opacity:.45;color:var(--text3)}
.month-pill.past:hover{opacity:.7}
html.dark .month-pill.active{background:var(--primary-light);color:var(--primary)}

/* Feed Container */
.feed{max-width:1480px;margin:0 auto;padding:.75rem 1.5rem 2rem}

/* Section Headers */
.sec-head{display:flex;align-items:center;gap:.5rem;margin:1.5rem 0 .75rem;padding-bottom:.4rem;border-bottom:1px solid var(--border-light)}.sec-head h2{font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:.35rem;margin:0}.sec-head .sec-count{font-size:.7rem;font-weight:700;color:var(--primary);background:var(--primary-light);padding:.15rem .45rem;border-radius:8px;margin-left:auto}

/* Event Cards */
.ev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem}
.ev-card{background:var(--glass-bg,var(--card-bg));backdrop-filter:var(--glass-blur,none);border:1px solid var(--glass-border,var(--border-light));border-radius:14px;padding:.85rem;cursor:default;transition:all .22s var(--ease);box-shadow:var(--shadow-soft,var(--shadow));position:relative;display:flex;flex-direction:column;gap:.35rem}
.ev-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover,var(--shadow-md))}
.ev-card.highlight{border-left:3px solid var(--gold)}
html.dark .ev-card{background:var(--glass-bg,var(--card-bg));border-color:var(--glass-border,var(--border))}
.ev-top{display:flex;align-items:center;gap:.5rem}
.ev-emoji{font-size:1.6rem;flex-shrink:0}
.ev-info{flex:1;min-width:0}
.ev-name{font-family:var(--font-display);font-weight:700;font-size:.88rem;color:var(--text);line-height:1.25}
.ev-date{font-size:.72rem;font-weight:600;color:var(--primary)}
.ev-loc{font-size:.68rem;color:var(--text3);display:flex;align-items:center;gap:.2rem;margin-top:.15rem}
.ev-tags{display:flex;flex-wrap:wrap;gap:.25rem;margin-top:.15rem}
.ev-tag{padding:.1rem .35rem;border-radius:8px;font-size:.6rem;font-weight:600;white-space:nowrap}
.ev-tag.konzerte{background:rgba(168,85,247,.1);color:#7c3aed}
.ev-tag.sport{background:rgba(16,185,129,.1);color:#059669}
.ev-tag.festivals{background:rgba(245,158,11,.1);color:#d97706}
.ev-tag.tradition{background:rgba(239,68,68,.1);color:#dc2626}
.ev-tag.kulinarik{background:rgba(236,72,153,.1);color:#db2777}
.ev-tag.community{background:rgba(59,130,246,.1);color:#2563eb}
html.dark .ev-tag.konzerte{background:rgba(168,85,247,.15);color:#a78bfa}
html.dark .ev-tag.sport{background:rgba(16,185,129,.15);color:#34d399}
html.dark .ev-tag.festivals{background:rgba(245,158,11,.15);color:#fbbf24}
html.dark .ev-tag.tradition{background:rgba(239,68,68,.15);color:#f87171}
html.dark .ev-tag.kulinarik{background:rgba(236,72,153,.15);color:#f472b6}
html.dark .ev-tag.community{background:rgba(59,130,246,.15);color:#93c5fd}
.ev-status{font-size:.58rem;font-weight:700;padding:.1rem .3rem;border-radius:6px;white-space:nowrap}
.ev-status.confirmed{background:rgba(16,185,129,.1);color:#059669}
.ev-status.expected{background:rgba(245,158,11,.1);color:#d97706}
.ev-status.soldout{background:rgba(239,68,68,.1);color:#dc2626}
html.dark .ev-status.confirmed{background:rgba(16,185,129,.15);color:#34d399}
html.dark .ev-status.expected{background:rgba(245,158,11,.15);color:#fbbf24}
html.dark .ev-status.soldout{background:rgba(239,68,68,.15);color:#f87171}
.ev-btns{display:flex;gap:.35rem;margin-top:.25rem;flex-wrap:wrap}
.ev-btns a{display:inline-flex;align-items:center;gap:.2rem;padding:.3rem .55rem;border-radius:10px;font-size:.68rem;font-weight:600;transition:all .15s;text-decoration:none}
.ev-btn-p{background:var(--primary);color:#fff}.ev-btn-p:hover{background:var(--primary-dark)}
.ev-btn-s{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}.ev-btn-s:hover{border-color:var(--primary);color:var(--primary)}
html.dark .ev-btn-s{background:var(--surface2);border-color:var(--border);color:var(--text2)}

/* Coming Up section - wider cards */
.coming-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem}
.coming-card{background:var(--glass-bg,var(--card-bg));backdrop-filter:var(--glass-blur,none);border:1px solid var(--glass-border,var(--border-light));border-radius:16px;padding:1rem 1.1rem;transition:all .22s var(--ease);box-shadow:var(--shadow-soft,var(--shadow));display:flex;gap:.75rem;align-items:flex-start}
.coming-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover,var(--shadow-md))}
.coming-card.highlight{border-left:3px solid var(--gold)}
html.dark .coming-card{background:var(--glass-bg,var(--card-bg));border-color:var(--glass-border,var(--border))}
.coming-date{background:var(--primary);color:#fff;border-radius:12px;padding:.4rem .55rem;text-align:center;flex-shrink:0;min-width:52px}
.coming-date .cd-day{font-family:var(--font-display);font-size:1.1rem;font-weight:800;line-height:1.1}
.coming-date .cd-month{font-size:.55rem;text-transform:uppercase;opacity:.85;letter-spacing:.03em}
html.dark .coming-date{background:var(--primary-light);color:var(--primary)}
.coming-info{flex:1;min-width:0}
.coming-name{font-family:var(--font-display);font-weight:700;font-size:.92rem;color:var(--text);line-height:1.25;margin-bottom:.2rem}

/* Footer */
.ev-footer{text-align:center;padding:2rem 1.5rem;max-width:1480px;margin:0 auto;font-size:.72rem;color:var(--text3);border-top:1px solid var(--border-light)}.ev-footer a{color:var(--primary);text-decoration:underline;text-underline-offset:2px}

/* No Results */
.no-results{text-align:center;padding:3rem 1rem;display:none}.no-results .nr-emoji{font-size:2.5rem;display:block;margin-bottom:.5rem}.no-results p{color:var(--text3);font-size:.88rem}

/* Back to Top */
.btt{position:fixed;bottom:1.5rem;right:1.5rem;width:44px;height:44px;border-radius:50%;background:var(--primary);color:#fff;font-size:1.1rem;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-md);cursor:pointer;border:none;z-index:90;opacity:0;visibility:hidden;transform:translateY(10px);transition:all .3s}.btt.show{opacity:1;visibility:visible;transform:translateY(0)}.btt:hover{background:var(--primary-dark)}html.dark .btt{background:#e8914a}

/* Responsive */
@media(max-width:1023px){.ev-grid{grid-template-columns:repeat(2,1fr)}.cat-cards{grid-template-columns:repeat(3,1fr)}.pulse-content{flex-direction:column;align-items:flex-start}.pulse-countdown{margin-top:.5rem}}
@media(max-width:767px){.ev-grid{grid-template-columns:1fr}.coming-grid{grid-template-columns:1fr}.cat-cards{grid-template-columns:repeat(3,1fr);padding:0 .75rem;gap:.45rem}.feed{padding:.5rem .75rem 1.5rem}.pulse-hero{margin:.75rem .75rem;padding:1.25rem}.cd-box{min-width:44px;padding:.4rem .5rem}.cd-num{font-size:1.1rem}.month-nav{padding:.4rem .75rem;justify-content:flex-start}}
@media(max-width:640px){.header-inner{gap:.35rem}.nav-tab{font-size:.72rem;padding:.45rem .4rem;gap:.2rem}.nav-tab .nav-label{display:none}.cat-cards{grid-template-columns:repeat(2,1fr)}.cat-card{padding:.65rem .5rem}.cat-card-emoji{font-size:1.3rem}.cat-card-title{font-size:.68rem}.theme-toggle{width:48px;height:28px}}
</style>
</head>

<script>
// ── Theme ──

const CATS=[{key:"tradition",emoji:"🏛️",label:"Züri Tradition"},{key:"konzerte",emoji:"🎵",label:"Konzerte"},{key:"festivals",emoji:"🎪",label:"Festivals"},{key:"kulinarik",emoji:"🍷",label:"Essen & Trinken"},{key:"sport",emoji:"⚽",label:"Sport"},{key:"community",emoji:"🌍",label:"Community"}];
const MONTHS=[{i:0,label:"Jan",emoji:"❄️",full:"Januar"},{i:1,label:"Feb",emoji:"💨",full:"Februar"},{i:2,label:"Mär",emoji:"🌸",full:"März"},{i:3,label:"Apr",emoji:"🌷",full:"April"},{i:4,label:"Mai",emoji:"🌿",full:"Mai"},{i:5,label:"Jun",emoji:"☀️",full:"Juni"},{i:6,label:"Jul",emoji:"🌞",full:"Juli"},{i:7,label:"Aug",emoji:"🏖️",full:"August"},{i:8,label:"Sep",emoji:"🍂",full:"September"},{i:9,label:"Okt",emoji:"🎃",full:"Oktober"},{i:10,label:"Nov",emoji:"🍁",full:"November"},{i:11,label:"Dez",emoji:"🎄",full:"Dezember"}];
const STATUS_MAP={confirmed:"✅ Bestätigt",expected:"📅 Erwartet",soldout:"🔥 Ausverkauft"};
const CAT_LABELS={konzerte:"Konzerte",sport:"Sport",festivals:"Festivals",tradition:"Züri Tradition",kulinarik:"Essen & Trinken",community:"Community"};

// ── State ──
let activeCat=null,activeMonth=null;
const today=new Date().toISOString().split('T')[0];
const sorted=EVENTS.sort((a,b)=>new Date(a.date)-new Date(b.date));
const upcoming=sorted.filter(e=>e.date>=today||(e.dateEnd&&e.dateEnd>=today));

// ── Pulse Hero ──
var pulseInterval=null;
function getNextHighlight(){
  var now=new Date().toISOString().split('T')[0];
  return sorted.filter(function(e){return e.highlight}).find(function(e){
    return e.date>=now||(e.dateEnd&&e.dateEnd>=now);
  })||null;
}
function renderPulse(){
  var hl=getNextHighlight();
  var el=document.getElementById('pulseHero');
  if(!hl){el.style.display='none';return}
  el.style.display='';
  var link=hl.websiteUrl||hl.ticketUrl||'#';
  el.innerHTML=`<div class="pulse-label"><span class="pulse-dot"></span> ZüriPulse – Nächstes Highlight</div>
    <div class="pulse-content">
      <span class="pulse-emoji">${hl.emoji}</span>
      <div class="pulse-info">
        <div class="pulse-name">${hl.name}</div>
        <div class="pulse-meta"><span>📅 ${hl.dateLabel}</span><span>📍 ${hl.location}</span></div>
        <div class="pulse-cta">${link!=='#'?`<a href="${link}" target="_blank" rel="noopener" class="pulse-btn">🎟️ Mehr erfahren</a>`:''}</div>
      </div>
      <div class="pulse-countdown" id="countdown">
        <div class="cd-box"><div class="cd-num" id="cdD">--</div><div class="cd-label">Tage</div></div>
        <div class="cd-box"><div class="cd-num" id="cdH">--</div><div class="cd-label">Std</div></div>
        <div class="cd-box"><div class="cd-num" id="cdM">--</div><div class="cd-label">Min</div></div>
        <div class="cd-box"><div class="cd-num" id="cdS">--</div><div class="cd-label">Sek</div></div>
      </div>
    </div>`;
  if(pulseInterval)clearInterval(pulseInterval);
  pulseInterval=setInterval(function(){
    var diff=new Date(hl.date)-new Date();
    if(diff<=0){renderPulse();return}
    var dD=document.getElementById('cdD'),dH=document.getElementById('cdH'),dM=document.getElementById('cdM'),dS=document.getElementById('cdS');
    if(dD)dD.textContent=Math.floor(diff/864e5);
    if(dH)dH.textContent=Math.floor((diff%864e5)/36e5);
    if(dM)dM.textContent=Math.floor((diff%36e5)/6e4);
    if(dS)dS.textContent=Math.floor((diff%6e4)/1e3);
  },1000);
  // Initial tick
  var diff=new Date(hl.date)-new Date();
  if(diff>0){
    document.getElementById('cdD').textContent=Math.floor(diff/864e5);
    document.getElementById('cdH').textContent=Math.floor((diff%864e5)/36e5);
    document.getElementById('cdM').textContent=Math.floor((diff%36e5)/6e4);
    document.getElementById('cdS').textContent=Math.floor((diff%6e4)/1e3);
  }
}

// ── Category Cards ──
function renderCats(){
  const el=document.getElementById('catCards');
  el.innerHTML=CATS.map(c=>{
    const count=upcoming.filter(e=>e.category===c.key).length;
    return`<div class="cat-card${activeCat===c.key?' active':''}" data-cat="${c.key}" onclick="toggleCat('${c.key}')">
      <span class="cat-card-emoji">${c.emoji}</span>
      <div class="cat-card-title">${c.label}</div>
      <span class="cat-card-count">${count} Events</span>
    </div>`;
  }).join('');
}

// ── Month Nav ──
function renderMonthNav(){
  const el=document.getElementById('monthNav');
  const curMonth=new Date().getMonth();
  el.innerHTML=MONTHS.map(m=>{
    var cls='month-pill';
    if(activeMonth===m.i||(activeMonth===null&&m.i===curMonth))cls+=' active';
    else if(m.i<curMonth)cls+=' past';
    return`<button class="${cls}" onclick="toggleMonth(${m.i})">${m.label}</button>`;
  }).join('');
}

// ── Filters ──
function toggleCat(key){
  activeCat=activeCat===key?null:key;
  renderCats();renderAll();
}
function toggleMonth(m){
  activeMonth=activeMonth===m?null:m;
  renderMonthNav();renderAll();
  const sec=document.getElementById('month-'+m);
  if(sec)sec.scrollIntoView({behavior:'smooth',block:'start'});
}

// ── Card Rendering ──
function cardHTML(e,large){
  const st=`<span class="ev-status ${e.status}">${STATUS_MAP[e.status]||''}</span>`;
  const catTag=`<span class="ev-tag ${e.category}">${CAT_LABELS[e.category]||e.category}</span>`;
  let btns='';
  if(e.ticketUrl)btns+=`<a href="${e.ticketUrl}" target="_blank" rel="noopener" class="ev-btn-p">🎟️ Tickets</a>`;
  if(e.websiteUrl)btns+=`<a href="${e.websiteUrl}" target="_blank" rel="noopener" class="ev-btn-s">↗️ Website</a>`;

  if(large){
    const d=new Date(e.date);
    const day=d.getDate();
    const mon=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'][d.getMonth()];
    return`<div class="coming-card${e.highlight?' highlight':''}">
      <div class="coming-date"><div class="cd-day">${day}</div><div class="cd-month">${mon}</div></div>
      <div class="coming-info">
        <div class="coming-name">${e.emoji} ${e.name}</div>
        <div class="ev-tags">${catTag} ${e.highlight?'<span class="ev-tag festivals">⭐ Grossevent</span>':''} ${st}</div>
        <div class="ev-loc">📍 ${e.location} · ${e.dateLabel}</div>
        ${btns?`<div class="ev-btns">${btns}</div>`:''}
      </div>
    </div>`;
  }
  return`<div class="ev-card${e.highlight?' highlight':''}">
    <div class="ev-top"><span class="ev-emoji">${e.emoji}</span><div class="ev-info"><div class="ev-date">${e.dateLabel}</div><div class="ev-name">${e.name}</div></div></div>
    <div class="ev-tags">${catTag} ${e.highlight?'<span class="ev-tag festivals">⭐</span>':''} ${st}</div>
    <div class="ev-loc">📍 ${e.location}</div>
    ${btns?`<div class="ev-btns">${btns}</div>`:''}
  </div>`;
}

// ── Render All ──
function renderAll(){
  const filtered=upcoming.filter(e=>{
    if(activeCat&&e.category!==activeCat)return false;
    if(activeMonth!==null&&new Date(e.date).getMonth()!==activeMonth)return false;
    return true;
  });

  // Coming Up
  const comEl=document.getElementById('comingSection');
  if(!activeCat&&activeMonth===null){
    const first=filtered.slice(0,8);
    comEl.innerHTML=`<div class="sec-head"><h2>⚡ Demnächst</h2><span class="sec-count">${first.length} Events</span></div><div class="coming-grid">${first.map(e=>cardHTML(e,true)).join('')}</div>`;
  }else{comEl.innerHTML='';}

  // Month Sections
  const msEl=document.getElementById('monthSections');
  const noRes=document.getElementById('noResults');
  let html='';
  const byMonth={};
  filtered.forEach(e=>{const m=new Date(e.date).getMonth();if(!byMonth[m])byMonth[m]=[];byMonth[m].push(e)});
  MONTHS.forEach(m=>{
    const evs=byMonth[m.i];
    if(!evs||!evs.length)return;
    html+=`<div id="month-${m.i}"><div class="sec-head"><h2>${m.emoji} ${m.full} 2026</h2><span class="sec-count">${evs.length}</span></div><div class="ev-grid">${evs.map(e=>cardHTML(e,false)).join('')}</div></div>`;
  });
  msEl.innerHTML=html;
  noRes.style.display=filtered.length?'none':'block';
}

// ── Init ──
function init(){
  renderPulse();renderCats();renderMonthNav();renderAll();
  document.getElementById('splash').classList.add('done');
  document.getElementById('app').style.display='';
  setTimeout(()=>{const s=document.getElementById('splash');if(s)s.remove()},600);
}

// ── Back to Top ──
window.addEventListener('scroll',()=>{document.getElementById('btt').classList.toggle('show',window.scrollY>400)},{passive:true});

init();
</script>
</body>
</html>
